set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",tmux-256color:Tc"

# Extended (modified) keys: lets apps like the pi/Claude Code agent receive
# Shift/Ctrl+Enter etc. The terminal-features line tells tmux the outer
# terminal (Ghostty) understands extended keys so it forwards them through.
set -g extended-keys on
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'
set -g repeat-time 1000
set -g mode-keys vi
set -g focus-events on

## name windows per directory basename
###########################################
# Drive the real window name (#W) from the cwd basename instead of the
# running command, and keep it updating as the pane changes directory.
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'
set -g window-status-format ' #I  #W '
set -g window-status-current-format ' #I  #W '

## status bar
##########################################
# Two-row status bar: the standard bar (status-left | centred window list |
# status-right) renders on the top row (status-format[1]); row 0 is left blank
# as a spacer below it. Per-window styles come from #{E:window-status-style}
# and #{E:window-status-current-style}; the window format's own style is scoped
# with push-default/pop-default. This is a trimmed version of tmux's built-in
# status-format default (the unused last/bell/activity style branches removed).
#
# Built up in chunks with `set -ga` (append) so each part is readable and
# commentable; the chunks are concatenated into one format string. NOTE: the
# `#[norange default]` after each `#[pop-default]` is required to close that
# window's clickable mouse range. Without it the LAST window has no following
# `#[range=...]` to implicitly close it, so its name becomes unclickable.
set -g status 2

# 1. status-left, then open the centred, clickable window list
set -g  'status-format[1]' '#[align=left]#{T;=/#{status-left-length}:status-left}'
set -ga 'status-format[1]' '#[list=on align=#{status-justify}]'

# 2. window loop #{W:<inactive>,<active>}. Inactive-window branch:
set -ga 'status-format[1]' '#{W:#[range=window|#{window_index} #{E:window-status-style}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}},'

# 3. active-window branch (list=focus), then close the #{W:} loop with `}`
set -ga 'status-format[1]' '#[range=window|#{window_index} list=focus #{E:window-status-current-style}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}}}'

# 4. status-right, right-aligned and non-clickable
set -ga 'status-format[1]' '#[nolist align=right]#{T;=/#{status-right-length}:status-right}'
set -g 'status-format[0]' ''
set -g status-interval 60 # sets refresh of status bar

## set status bar colours
set -g status-style fg=brightwhite,bg=default

## show if activity in another window
set -g monitor-activity on
set -g visual-activity off

## set status bar items
set -g status-justify centre
set -g status-left-length 40
set -g status-left "#[fg=colour250] #S #[fg=colour244] #[fg=colour250]#I #[fg=colour244] #[fg=colour250]#P "
set -g status-right "#[fg=colour250]%R #[fg=colour244] #[fg=colour250]%d %b "

## set inactive windows
setw -g window-status-style fg=colour250,bg=default

## set active window red
setw -g window-status-current-style fg=colour203,bg=default,bold

# set pane divider colours
set -g pane-border-style fg=colour239,bg=default

set -g pane-active-border-style fg=colour203,bg=default

## set command line
set -g message-style fg=white,bg=black,bright
set -g display-time 2000

###########################################

# reduce key escape time
set -s escape-time 50

# increase scrollback buffer size
set-option -g history-limit 50000

# start window numbering from 1 not 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# key bindings
bind r source-file ~/.tmux.conf \; display "Reloaded!"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# vim-tmux-navigator: seamless C-h/j/k/l across nvim splits and tmux panes.
# If the active pane runs (n)vim the key is forwarded so nvim moves its split;
# otherwise tmux switches pane. Nvim half lives in dotfiles/config/nvim
# (plugins/ergonomics.lua); both halves are required.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'
# In copy-mode, C-h/j/k/l move panes directly (no nvim to forward to).
bind -T copy-mode-vi 'C-h' select-pane -L
bind -T copy-mode-vi 'C-j' select-pane -D
bind -T copy-mode-vi 'C-k' select-pane -U
bind -T copy-mode-vi 'C-l' select-pane -R

# clipboard: OSC52 — tmux emits the escape sequence, the terminal (Ghostty)
# sets the system clipboard. Works on macOS and Linux with no external binary
# (no pbcopy/xclip/wl-copy) and over SSH. Same config on every machine.
set -g set-clipboard on

# copy-mode-vi bindings
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel
bind -T copy-mode-vi S-PPage send -X halfpage-up
bind -T copy-mode-vi S-NPage send -X halfpage-down

# setw is set-window-option shortened

# enable mouse scroll
set -g mouse on

# pane synchronization toggle
bind S setw synchronize-panes

# kill pane/window bindings
bind x kill-pane
bind X kill-window

# aggressive resize for multi-client sessions
setw -g aggressive-resize on

# List of plugins
set -g @plugin 'tmux-plugins/tpm'

# extrakto: prefix+Tab to fuzzy-grab paths/URLs/hashes/words off the screen
# and insert into the pane or copy. Use OSC52 for the clipboard so it stays
# dep-free and cross-OS, matching set-clipboard above (no pbcopy/xclip).
set -g @plugin 'laktak/extrakto'
set -g @extrakto_clip_tool_run "tmux_osc52"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
