set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",tmux-256color:Tc"
set -g repeat-time 1000
set -g mode-keys vi
set -g focus-events on

## name windows per directory basename
###########################################
# Drive the real window name (#W) from the cwd basename instead of the
# running command, and keep it updating as the pane changes directory.
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'
set -g window-status-format ' #I  #W '
set -g window-status-current-format ' #I  #W '

## status bar
##########################################
set -g status 2
set -g 'status-format[1]' '#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{window-status-separator}}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]'
set -g 'status-format[0]' ''
set -g status-interval 60 # sets refresh of status bar

## set status bar colours
set -g status-style fg=brightwhite,bg=default

## show if activity in another window
set -g monitor-activity on
set -g visual-activity off

## set status bar items
set -g status-justify centre
set -g status-left-length 40
set -g status-left "#[fg=colour250] #S #[fg=colour244] #[fg=colour250]#I #[fg=colour244] #[fg=colour250]#P "
set -g status-right "#[fg=colour250]%R #[fg=colour244] #[fg=colour250]%d %b "

## set inactive windows
setw -g window-status-style fg=colour250,bg=default

## set active window red
setw -g window-status-current-style fg=colour203,bg=default,bold

# set pane divider colours
set -g pane-border-style fg=colour239,bg=default

set -g pane-active-border-style fg=colour203,bg=default

## set command line
set -g message-style fg=white,bg=black,bright
set -g display-time 2000

###########################################

# reduce key escape time
set -s escape-time 50

# increase scrollback buffer size
set-option -g history-limit 50000

# start window numbering from 1 not 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# key bindings
bind r source-file ~/.tmux.conf \; display "Reloaded!"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# copy-mode-vi bindings
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"
bind -T copy-mode-vi S-PPage send -X halfpage-up
bind -T copy-mode-vi S-NPage send -X halfpage-down

# setw is set-window-option shortened

# enable mouse scroll
set -g mouse on

# pane synchronization toggle
bind S setw synchronize-panes

# kill pane/window bindings
bind x kill-pane
bind X kill-window

# aggressive resize for multi-client sessions
setw -g aggressive-resize on

# List of plugins
set -g @plugin 'tmux-plugins/tpm'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
