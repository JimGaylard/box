---
- name: Download rustup installer
  get_url:
    url: https://sh.rustup.rs
    dest: /tmp/rustup.sh
    mode: '0755'
  tags: [rust]

- name: Run rustup installer
  shell: /tmp/rustup.sh -y --no-modify-path
  args:
    creates: "{{ ansible_facts['user_dir'] }}/.cargo/bin/rustc"
  tags: [rust]

- name: Deploy Rust shell configuration
  copy:
    src: "{{ playbook_dir }}/../dotfiles/bashrc.d/rust.sh"
    dest: "{{ ansible_facts['user_dir'] }}/.bashrc.d/rust.sh"
    force: yes
    mode: '0644'
  tags: [rust, dotfiles]
