---
- name: install tpm (tmux plugin manager)
  ansible.builtin.git:
    repo: https://github.com/tmux-plugins/tpm
    dest: "{{ ansible_facts['user_dir'] }}/.tmux/plugins/tpm"
    version: master
  tags: [tmux, dotfiles]

- name: install tmux plugins declared in tmux.conf
  ansible.builtin.shell: |
    tmux start-server
    tmux set-environment -g TMUX_PLUGIN_MANAGER_PATH "{{ ansible_facts['user_dir'] }}/.tmux/plugins/"
    "{{ ansible_facts['user_dir'] }}/.tmux/plugins/tpm/bin/install_plugins"
  register: tpm_install
  changed_when: "'Already installed' not in tpm_install.stdout"
  tags: [tmux, dotfiles]
