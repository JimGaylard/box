---
- name: Install uv via Homebrew (Darwin)
  community.general.homebrew:
    name: uv
    state: present
  when: ansible_facts['os_family'] == "Darwin"
  tags: [uv, packages]

- name: Download uv installer (Linux)
  get_url:
    url: https://astral.sh/uv/install.sh
    dest: /tmp/uv-install.sh
    mode: '0755'
  when: ansible_facts['os_family'] != "Darwin"
  tags: [uv]

- name: Run uv installer (Linux)
  shell: /tmp/uv-install.sh
  args:
    creates: "{{ ansible_facts['user_dir'] }}/.local/bin/uv"
  when: ansible_facts['os_family'] != "Darwin"
  tags: [uv]

- name: Deploy uv shell configuration (Bash)
  copy:
    src: "{{ playbook_dir }}/../dotfiles/bashrc.d/uv.sh"
    dest: "{{ ansible_facts['user_dir'] }}/.bashrc.d/uv.sh"
    force: yes
    mode: '0644'
  tags: [uv, dotfiles]

- name: Deploy uv shell configuration (Zsh)
  copy:
    src: "{{ playbook_dir }}/../dotfiles/zshrc.d/uv.zsh"
    dest: "{{ ansible_facts['user_dir'] }}/.zshrc.d/uv.zsh"
    force: yes
    mode: '0644'
  when: ansible_facts['os_family'] == "Darwin"
  tags: [uv, dotfiles]
