---
- hosts: localhost
  tasks:
    - name: Check if SSH key exists
      stat:
        path: "{{ ansible_facts['user_dir'] }}/.ssh/id_ed25519"
      register: ssh_key_stat
      tags: [ssh]

    - name: Prompt for SSH passphrase if key is missing
      pause:
        prompt: "Enter passphrase for SSH key"
        echo: no
      register: ssh_passphrase_input
      when: not ssh_key_stat.stat.exists
      tags: [ssh]

    - name: Generate SSH key
      community.crypto.openssh_keypair:
        path: "{{ ansible_facts['user_dir'] }}/.ssh/id_ed25519"
        type: ed25519
        passphrase: "{{ ssh_passphrase_input.user_input | default('') }}"
        comment: "{{ ansible_facts['user_id'] }}@{{ ansible_facts['hostname'] }}"
        force: no
      when: not ssh_key_stat.stat.exists
      tags: [ssh]
    - name: Ensure apt keyrings directory exists
      become: yes
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'
      tags: [packages]

    - name: Add GitHub CLI apt key
      become: yes
      get_url:
        url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
        dest: /etc/apt/keyrings/githubcli-archive-keyring.gpg
        mode: '0644'
      tags: [packages]

    - name: Add GitHub CLI apt repository
      become: yes
      apt_repository:
        repo: "deb [arch={{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }} signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
        filename: github-cli
        state: present
      tags: [packages]

    - name: apt packages
      become: yes
      apt:
        update_cache: yes
        name:
          - gh
          - htop
          - jq
          - keychain
          - neovim
          - strace
          - silversearcher-ag
      tags: [packages]
    - name: Deploy dotfiles
      include_tasks: ../tasks/dotfiles.yml
      tags: [dotfiles]

    - name: Setup Homebrew
      include_tasks: ../tasks/homebrew.yml
      tags: [homebrew, dotfiles]

    - name: Setup neovim
      include_tasks: ../tasks/neovim.yml
      tags: [neovim, dotfiles]

    - name: Setup golang
      include_tasks: ../tasks/golang.yml
      tags: [golang, dotfiles]

    - name: Setup nvm
      include_tasks: ../tasks/nvm.yml
      tags: [nvm, dotfiles]

    - name: Setup uv
      include_tasks: ../tasks/uv.yml
      tags: [uv, dotfiles]

    - name: Setup rust
      include_tasks: ../tasks/rust.yml
      tags: [rust, dotfiles]

