---
- hosts: localhost
  vars:
    fedora_release: 32
  tasks:
    - name: Check if SSH key exists
      stat:
        path: "{{ ansible_facts['user_dir'] }}/.ssh/id_ed25519"
      register: ssh_key_stat
      tags: [ssh]

    - name: Prompt for SSH passphrase if key is missing
      pause:
        prompt: "Enter passphrase for SSH key"
        echo: no
      register: ssh_passphrase_input
      when: not ssh_key_stat.stat.exists
      tags: [ssh]

    - name: Generate SSH key
      community.crypto.openssh_keypair:
        path: "{{ ansible_facts['user_dir'] }}/.ssh/id_ed25519"
        type: ed25519
        passphrase: "{{ ssh_passphrase_input.user_input | default('') }}"
        comment: "{{ ansible_facts['user_id'] }}@{{ ansible_facts['hostname'] }}"
        force: no
      when: not ssh_key_stat.stat.exists
      tags: [ssh]
    - name: dnf packages
      become: yes
      dnf:
        name:
          - 'https://download1.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ fedora_release }}.noarch.rpm'
          - 'https://download1.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ fedora_release }}.noarch.rpm'
          - emacs
          - ffmpeg
          - gh
          - gnome-shell-extension-no-topleft-hot-corner
          - gnome-tweaks
          - htop
          - jq
          - keychain
          - neovim
          - snapd
          - strace
          - ripgrep
      tags: [packages]
    - name: snap symlink (for classic)
      become: yes
      file:
        src: /var/lib/snapd/snap
        dest: /snap
        owner: root
        group: root
        state: link
      tags: [packages]
    - name: snap packages
      become: yes
      snap:
        name:
          - postman
          - spotify
      tags: [packages]
    - name: snap install classic packages
      become: yes
      snap:
        name:
          - code
          - intellij-idea-community
          - slack
        classic: yes
      tags: [packages]
    - name: Deploy dotfiles
      include_tasks: ../tasks/dotfiles.yml
      tags: [dotfiles]

    - name: Setup Homebrew
      include_tasks: ../tasks/homebrew.yml
      tags: [homebrew, dotfiles]

    - name: Setup neovim
      include_tasks: ../tasks/neovim.yml
      tags: [neovim, dotfiles]

    - name: bash-my-aws
      git:
        repo: git@github.com:bash-my-universe/bash-my-aws.git
        dest: "{{ ansible_facts['user_dir'] }}/.bash-my-aws"
      tags: [dotfiles]

    - name: Setup golang
      include_tasks: ../tasks/golang.yml
      tags: [golang, dotfiles]

    - name: Setup nvm
      include_tasks: ../tasks/nvm.yml
      tags: [nvm, dotfiles]

    - name: Setup uv
      include_tasks: ../tasks/uv.yml
      tags: [uv, dotfiles]

    - name: Setup rust
      include_tasks: ../tasks/rust.yml
      tags: [rust, dotfiles]
